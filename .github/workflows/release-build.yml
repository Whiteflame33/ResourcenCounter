name: Release Build
on:
  workflow_dispatch:
    inputs:
      bump:
        type: choice
        options:
          - patch
          - minor
          - major
        description: 'Version Bump Type'

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest

    outputs:
      release_version: ${{ steps.ver.outputs.release_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          path: .
          ref: master
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Get Current Version
        id: current_ver
        shell: bash
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Current Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compute New Version
        id: ver
        shell: bash
        run: |
          CURRENT_VERSION=${{ steps.current_ver.outputs.version }}
          
          echo "Current version: $CURRENT_VERSION"
          
          BASE=${CURRENT_VERSION%-SNAPSHOT}
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          
          BUMP="${{ github.event.inputs.bump }}"
          
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          RELEASE_VERSION="$MAJOR.$MINOR.$PATCH"
          
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: Set New Version
        shell: bash
        run: |
          mvn versions:set -DnewVersion=${{ steps.ver.outputs.release_version }} -DgenerateBackupPoms=false

      - name: Commit Release Version
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add pom.xml
          git commit -m "[CICD] Release v${{ steps.ver.outputs.release_version }}"
          git push origin master

      - name: Create Release Tag
        shell: bash
        run: |
          git tag release-v${{ steps.ver.outputs.release_version }}
          git push origin release-v${{ steps.ver.outputs.release_version }}
          git fetch --tags

      - name: Compute Snapshot Version
        shell: bash
        id: snap_ver
        run: |
          RELEASE=${{ steps.ver.outputs.release_version }}
          SNAPSHOT="$RELEASE-SNAPSHOT"
          echo "snapshot_version=$SNAPSHOT" >> $GITHUB_OUTPUT

      - name: Set New Snapshot Version
        shell: bash
        run: |
          mvn versions:set -DnewVersion=${{ steps.snap_ver.outputs.snapshot_version }} -DgenerateBackupPoms=false

      - name: Commit Snapshot Version
        shell: bash
        run: |
          git add pom.xml
          git commit -m "[CICD] Prepare next version ${{ steps.snap_ver.outputs.snapshot_version }}"
          git push origin master
          git fetch --tags

  build:
    needs: version

    strategy:
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            extension: x86_64
            app-type: app-image
            jpackage-flags: ""
          - name: windows-installer
            os: windows-latest
            extension: exe
            app-type: exe
            jpackage-flags: "--win-menu --win-shortcut --win-dir-chooser"
          - name: windows
            os: windows-latest
            extension: exe
            app-type: app-image
            jpackage-flags: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          ref: release-v${{ needs.version.outputs.release_version }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Verify tools
        shell: bash
        run: |
          java -version
          test -f pom.xml

      - name: Build JAR
        shell: bash
        run: mvn -B clean package

      - name: Package App
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            RAW_VERSION=$VERSION
            VERSION=${RAW_VERSION%-SNAPSHOT}
          fi

          JAR=$(ls target/rescount-*.jar | head -n 1)

          mkdir dist

          jpackage \
          --input target \
          --name ResourcenCounter \
          --main-jar $(basename "$JAR") \
          --main-class de.whiteflame.rescount.Main \
          --type ${{ matrix.app-type }} \
          --dest dist \
          --app-version $VERSION \
          ${{ matrix.jpackage-flags }}

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: ResourcenCounter_${{ steps.version.outputs.version }}_${{ matrix.name }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Files (Debug)
        shell: bash
        run: ls -R artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-v${{ needs.version.outputs.release_version }}
          name: Release ${{ needs.version.outputs.release_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

